<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kasir Mitra Kaca v7.9.2 - Full Features A6</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #c0392b; --info: #2980b9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f4f4; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: white; padding: 15px; border-right: 1px solid #ddd; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        h3 { color: var(--primary); margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-top: 10px; color: #555; }
        input, select, button { width: 100%; padding: 8px; margin: 4px 0; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        .row { display: flex; gap: 5px; align-items: center; }
        .btn-add { background: var(--success); color: white; border: none; padding: 12px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        
        /* Main Area */
        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; background: #fdfdfd; }
        .table-cont { flex: 1; background: white; border-radius: 8px; overflow: auto; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; color: #333; position: sticky; top: 0; }

        /* Status & Total */
        .summary-box { background: white; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .total-text { font-size: 24px; font-weight: bold; color: var(--info); }

        /* Admin Modal */
        #adminModal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; }
        .modal-content { background: white; width: 90%; margin: 20px auto; padding: 20px; border-radius: 8px; max-height: 90vh; overflow-y: auto; }

        /* PRINT SETTINGS A6 */
        @media print {
            @page { size: A6; margin: 5mm; }
            body { background: white; display: block; }
            .sidebar, .no-print, #adminModal, .btn-add { display: none !important; }
            .main { padding: 0; margin: 0; width: 100%; }
            .table-cont { border: none; }
            table { font-size: 9pt; width: 100%; }
            th, td { padding: 3px; border-bottom: 1px dashed #000; }
            .summary-box { border: none; display: block; text-align: right; }
            .total-text { font-size: 14pt; }
            .nota-header { display: block !important; text-align: center; margin-bottom: 10px; border-bottom: 1px double #000; padding-bottom: 5px; }
        }
        .nota-header { display: none; }
    </style>
</head>
<body>

<div class="sidebar no-print">
    <h3>Input Pesanan</h3>
    <button onclick="bukaAdmin()" style="background:var(--danger); color:white; border:none; font-size:11px;">🔒 LOGIN ADMIN</button>
    
    <label>Nama Pembeli:</label>
    <input type="text" id="pembeli" value="Umum">
    
    <label>Ukuran (cm):</label>
    <div class="row">
        <input type="number" id="p" placeholder="P">
        <span>x</span>
        <input type="number" id="l" placeholder="L">
    </div>

    <label>Jenis Kaca:</label>
    <select id="selKaca"></select>

    <label>Pilihan Bevel:</label>
    <select id="bevel">
        <option value="none">Tanpa Bevel</option>
        <option value="bev2">Bevel 2-2.5cm</option>
        <option value="bev3">Bevel 3cm</option>
    </select>

    <div style="background:#f9f9f9; padding:8px; border-radius:5px; margin-top:10px;">
        <label style="margin-top:0">Jasa Tambahan (Jumlah):</label>
        <div class="row"><span>Bor</span><input type="number" id="bor" value="0"></div>
        <div class="row"><span>Coak Pojok</span><input type="number" id="pojok" value="0"></div>
        <div class="row"><span>Coak Tepi</span><input type="number" id="tepi" value="0"></div>
    </div>

    <label>Status Bayar:</label>
    <select id="status_bayar" onchange="toggleDP()">
        <option value="Lunas">Lunas</option>
        <option value="Belum Lunas">Belum Lunas</option>
    </select>
    
    <div id="dp_area" style="display:none;">
        <label>Uang Muka (DP):</label>
        <input type="number" id="dp_val" value="0">
    </div>

    <button class="btn-add" onclick="tambahItem()">✚ TAMBAH ITEM</button>
    <button onclick="prosesTransaksi()" style="background:var(--primary); color:white; border:none; padding:12px; margin-top:10px;">🖨️ CETAK NOTA A6</button>
</div>

<div class="main">
    <div class="nota-header">
        <h2 id="printNamaToko">MITRA KACA</h2>
        <p id="printAlamatToko">-</p>
        <p style="font-size:10px;">Nota: <span id="notaNomor"></span> | Tgl: <span id="notaTgl"></span> | Hal: <span id="notaCust"></span></p>
    </div>

    <div class="table-cont">
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Ukuran</th>
                    <th>Detail Jasa</th>
                    <th>Subtotal</th>
                    <th class="no-print">Aksi</th>
                </tr>
            </thead>
            <tbody id="billBody"></tbody>
        </table>
    </div>

    <div class="summary-box">
        <div id="statusDisplay" style="font-weight:bold; color:var(--danger)"></div>
        <div class="total-text" id="totalDisplay">TOTAL: Rp 0</div>
    </div>
</div>

<div id="adminModal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between">
            <h3>Panel Admin (Data Kaca & Jasa)</h3>
            <button onclick="tutupAdmin()" style="width:80px; background:#999; color:white; border:none;">TUTUP</button>
        </div>
        <hr>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div>
                <h4>Pengaturan KOP Toko</h4>
                <input type="text" id="admNamaToko" placeholder="Nama Toko">
                <input type="text" id="admAlamatToko" placeholder="Alamat Toko">
                <button onclick="updateKop()" style="background:var(--info); color:white; border:none;">Simpan KOP</button>
            </div>
            <div>
                <h4>Tambah/Update Kaca</h4>
                <input type="text" id="admNama" placeholder="Nama Kaca">
                <input type="number" id="admHarga" placeholder="Harga/m2">
                <input type="number" id="admGM" placeholder="Harga GM/m">
                <button onclick="updateHarga()" style="background:var(--success); color:white; border:none;">Simpan Kaca</button>
            </div>
        </div>
        <table style="margin-top:20px;">
            <thead><tr><th>Nama Kaca</th><th>Harga/m2</th><th>Harga GM</th><th>Aksi</th></tr></thead>
            <tbody id="adminTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('mitraKaca_v7_db')) || {
        inventory: { 
            "Clear 5mm": { harga: 350000, gm: 15000, bor: 5000, pojok: 5000, tepi: 7000, bev2: 15000, bev3: 20000 } 
        },
        kop: { nama: "MITRA KACA", alamat: "Jl. Alamat Anda No. 123" }
    };

    let keranjang = [];

    function saveDB() {
        localStorage.setItem('mitraKaca_v7_db', JSON.stringify(db));
        renderUI();
    }

    function renderUI() {
        const sel = document.getElementById('selKaca');
        sel.innerHTML = "";
        for (let k in db.inventory) {
            sel.innerHTML += `<option value="${k}">${k}</option>`;
        }
        document.getElementById('printNamaToko').innerText = db.kop.nama;
        document.getElementById('printAlamatToko').innerText = db.kop.alamat;
    }

    function toggleDP() {
        const s = document.getElementById('status_bayar').value;
        document.getElementById('dp_area').style.display = (s === "Belum Lunas") ? "block" : "none";
    }

    function tambahItem() {
        const p = parseFloat(document.getElementById('p').value);
        const l = parseFloat(document.getElementById('l').value);
        const jenis = document.getElementById('selKaca').value;
        const bevType = document.getElementById('bevel').value;
        
        if(!p || !l) return alert("Isi ukuran!");

        const d = db.inventory[jenis];
        const h_kaca = (p/100 * l/100) * d.harga;
        const h_gm = (2*(p/100) + 2*(l/100)) * (d.gm || 0);
        
        let h_bev = 0;
        if(bevType === 'bev2') h_bev = (2*(p/100) + 2*(l/100)) * d.bev2;
        if(bevType === 'bev3') h_bev = (2*(p/100) + 2*(l/100)) * d.bev3;

        const nBor = parseInt(document.getElementById('bor').value);
        const nPojok = parseInt(document.getElementById('pojok').value);
        const nTepi = parseInt(document.getElementById('tepi').value);
        
        const h_jasa = (nBor * d.bor) + (nPojok * d.pojok) + (nTepi * d.tepi);
        const totalItem = h_kaca + h_gm + h_bev + h_jasa;
        
        let detail = `Bor:${nBor}, CP:${nPojok}, CT:${nTepi}`;
        if(bevType !== 'none') detail += `, ${bevType}`;

        keranjang.push({ jenis, p, l, detail, subtotal: totalItem });
        renderBill();
    }

    function renderBill() {
        const body = document.getElementById('billBody');
        body.innerHTML = "";
        let total = 0;
        keranjang.forEach((it, i) => {
            total += it.subtotal;
            body.innerHTML += `<tr>
                <td>${it.jenis}</td>
                <td>${it.p}x${it.l}</td>
                <td>${it.detail}</td>
                <td>Rp ${Math.round(it.subtotal).toLocaleString()}</td>
                <td class="no-print"><button onclick="hapusItem(${i})" style="color:red; background:none; border:none; width:auto; cursor:pointer;">X</button></td>
            </tr>`;
        });
        
        const dp = parseFloat(document.getElementById('dp_val').value) || 0;
        const status = document.getElementById('status_bayar').value;
        
        document.getElementById('totalDisplay').innerText = "TOTAL: Rp " + Math.round(total).toLocaleString();
        document.getElementById('statusDisplay').innerText = (status === "Lunas") ? "STATUS: LUNAS" : `SISA: Rp ${Math.round(total - dp).toLocaleString()}`;
    }

    function hapusItem(i) { keranjang.splice(i, 1); renderBill(); }

    function prosesTransaksi() {
        if(keranjang.length === 0) return alert("Keranjang kosong!");
        document.getElementById('notaNomor').innerText = "N-" + Date.now().toString().slice(-6);
        document.getElementById('notaTgl').innerText = new Date().toLocaleDateString();
        document.getElementById('notaCust').innerText = document.getElementById('pembeli').value;
        window.print();
        keranjang = [];
        renderBill();
    }

    // --- ADMIN FUNCTIONS ---
    function bukaAdmin() {
        if(prompt("Password:") === "admin123") {
            document.getElementById('adminModal').style.display = 'block';
            renderAdminTable();
        }
    }
    function tutupAdmin() { document.getElementById('adminModal').style.display = 'none'; }

    function updateKop() {
        db.kop.nama = document.getElementById('admNamaToko').value;
        db.kop.alamat = document.getElementById('admAlamatToko').value;
        saveDB();
        alert("KOP Diperbarui");
    }

    function updateHarga() {
        const n = document.getElementById('admNama').value;
        const h = parseInt(document.getElementById('admHarga').value);
        const g = parseInt(document.getElementById('admGM').value);
        if(!n || !h) return;
        db.inventory[n] = { ...db.inventory["Clear 5mm"], harga: h, gm: g };
        saveDB();
        renderAdminTable();
    }

    function renderAdminTable() {
        const b = document.getElementById('adminTableBody');
        b.innerHTML = "";
        for (let k in db.inventory) {
            b.innerHTML += `<tr><td>${k}</td><td>${db.inventory[k].harga}</td><td>${db.inventory[k].gm}</td><td><button onclick="deleteKaca('${k}')" style="background:red; color:white; border:none; padding:3px;">Hapus</button></td></tr>`;
        }
    }

    function deleteKaca(k) { delete db.inventory[k]; saveDB(); renderAdminTable(); }

    renderUI();
</script>
</body>
</html>
